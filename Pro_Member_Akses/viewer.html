<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UMT Pro - Materi Viewer</title>
    <link rel="icon" type="image/png" href="UMT-Logo - Copy.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0D1117; --bg-panel: #161B22; --border-color: #30363D;
            --text-primary: #C9D1D9; --text-secondary: #8B949E; --accent-cyan: #2F81F7;
            --dropdown-bg: #21262d;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .viewer-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-panel);
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            gap: 10px;
            z-index: 10;
        }
        .toolbar-section { display: flex; align-items: center; gap: 0.5rem; }
        .toolbar-section.title-section { flex: 1; min-width: 0; justify-content: center; position: relative; }
        .title-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; max-width: 100%; padding: 4px 8px; border-radius: 6px; transition: background 0.2s;
        }
        .title-wrapper:hover { background-color: var(--border-color); }
        .toolbar-title {
            font-size: 1rem; font-weight: bold; margin: 0; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 400px;
        }
        @media (max-width: 768px) { .toolbar-title { max-width: 150px; font-size: 0.9rem; } }
        .title-icon { font-size: 0.8rem; color: var(--text-secondary); flex-shrink: 0; }
        .title-dropdown {
            display: none; position: absolute; top: 120%; left: 50%; transform: translateX(-50%);
            width: max-content; max-width: 80vw; background-color: var(--dropdown-bg);
            border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000; text-align: center;
            user-select: text;
        }
        .title-dropdown.show { display: block; animation: fadeIn 0.2s ease-in-out; }
        .full-title-text { color: var(--text-primary); font-size: 1rem; font-weight: bold; white-space: normal; line-height: 1.5; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .toolbar-button {
            background: none; border: 1px solid transparent; color: var(--text-primary);
            cursor: pointer; padding: 0.5rem; border-radius: 4px; display: flex; align-items: center; justify-content: center;
        }
        .toolbar-button:hover:not(:disabled) { background-color: var(--border-color); }
        .toolbar-button:disabled { color: var(--text-secondary); cursor: not-allowed; }

        /* Area scroll utama */
        .pdf-viewer {
            flex-grow: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background-color: #0d1117;
            position: relative;
            touch-action: pan-x pan-y;
        }

        /*
         * pages-container: menampung semua page-slot
         * Lebarnya di-set JS sesuai lebar halaman PDF
         */
        #pages-container {
            position: relative;
            margin: 0 auto;
            /* width & height di-set JS */
        }

        /*
         * Setiap halaman PDF punya slot dengan posisi absolute.
         * Slot ini sudah punya ukuran yang benar sehingga
         * scroll area tahu total tinggi dokumen.
         * Canvas di dalam slot hanya dibuat kalau halaman terlihat.
         */
        .page-slot {
            position: absolute;
            left: 0;
            width: 100%;
            background-color: #1a1f27;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .page-slot canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Placeholder teks saat halaman belum dirender */
        .page-placeholder {
            color: var(--text-secondary);
            font-size: 0.85rem;
            pointer-events: none;
            user-select: none;
        }

        .status-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.2rem; color: var(--text-secondary);
            pointer-events: none;
        }

        /* Indikator zoom */
        #zoom-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }
        #zoom-indicator.visible { opacity: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="viewer-container">
        <div class="toolbar">
            <div class="toolbar-section">
                <a href="index.html" class="toolbar-button" title="Kembali">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <button id="prev-materi" class="toolbar-button" title="Sebelumnya">
                    <i class="fa-solid fa-angles-left"></i>
                </button>
            </div>

            <div class="toolbar-section title-section">
                <div class="title-wrapper" id="title-trigger" title="Lihat Judul">
                    <h1 id="materi-title-short" class="toolbar-title">Memuat...</h1>
                    <i class="fa-solid fa-chevron-down title-icon"></i>
                </div>
                <div id="title-dropdown" class="title-dropdown">
                    <div id="materi-title-full" class="full-title-text">Memuat materi...</div>
                </div>
            </div>

            <div class="toolbar-section">
                <button id="next-materi" class="toolbar-button" title="Selanjutnya">
                    <i class="fa-solid fa-angles-right"></i>
                </button>
                <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 5px;"></div>
                <button id="zoom-out" class="toolbar-button" title="Perkecil">
                    <i class="fa-solid fa-search-minus"></i>
                </button>
                <button id="zoom-in" class="toolbar-button" title="Perbesar">
                    <i class="fa-solid fa-search-plus"></i>
                </button>
            </div>
        </div>

        <div id="pdf-viewer" class="pdf-viewer">
            <div id="pages-container"></div>
            <div id="status-message" class="status-message">Memuat PDF...</div>
        </div>
    </div>

    <div id="zoom-indicator">100%</div>

    <script src="data.js"></script>
    <script src="pdfjs/build/pdf.mjs"></script>

<script type="module">
    import * as pdfjsLib from './pdfjs/build/pdf.mjs';

    const token = sessionStorage.getItem('sessionToken');
    if (!token) { window.location.href = '../Login/'; }

    // ─── Helper ───────────────────────────────────────────────
    function markAsCompleted(itemId) {
        const key = 'userCompletedItems';
        let completed = JSON.parse(localStorage.getItem(key)) || [];
        if (!completed.includes(itemId)) {
            completed.push(itemId);
            localStorage.setItem(key, JSON.stringify(completed));
        }
    }
    function updateLastActivity(type, item) {
        const key = 'userLastActivity';
        let lastActivity = JSON.parse(localStorage.getItem(key)) || {};
        lastActivity[type] = { id: item.id, title: item.title, filePath: item.filePath, videoId: item.videoId };
        localStorage.setItem(key, JSON.stringify(lastActivity));
    }

    // ─── DOM ──────────────────────────────────────────────────
    const titleShortEl     = document.getElementById('materi-title-short');
    const titleFullEl      = document.getElementById('materi-title-full');
    const titleTrigger     = document.getElementById('title-trigger');
    const titleDropdown    = document.getElementById('title-dropdown');
    const statusMessageEl  = document.getElementById('status-message');
    const viewerEl         = document.getElementById('pdf-viewer');
    const pagesContainer   = document.getElementById('pages-container');
    const zoomIndicator    = document.getElementById('zoom-indicator');

    pdfjsLib.GlobalWorkerOptions.workerSrc = './pdfjs/build/pdf.worker.mjs';

    // ─── State ────────────────────────────────────────────────
    let pdfDoc          = null;
    let currentScale    = 1.0;
    let autoFitScale    = 1.0;

    /*
     * DPR dibatasi maksimal 2 untuk mencegah canvas terlalu besar
     * di HP dengan layar high-density (DPR 3 atau 4)
     */
    const MAX_DPR = 2;
    const dpr     = Math.min(window.devicePixelRatio || 1, MAX_DPR);

    /*
     * pageHeights: array tinggi setiap halaman (dalam CSS px)
     * diisi saat buildLayout, dipakai untuk menghitung posisi slot
     */
    let pageHeights   = [];   // tinggi per halaman (px)
    let pageOffsets   = [];   // posisi top setiap halaman (px)
    let totalHeight   = 0;
    let pageWidth     = 0;    // lebar halaman (px), sama untuk semua

    /*
     * renderingPages: Set berisi nomor halaman yang sedang
     * dalam proses render agar tidak double-render
     */
    const renderingPages = new Set();

    // Margin antar halaman (px)
    const PAGE_GAP = 16;

    // ─── Pinch Zoom ───────────────────────────────────────────
    let initialPinchDistance = 0;
    let initialScale         = 1;
    let isPinching           = false;

    // ─── Timers ───────────────────────────────────────────────
    let renderDebounceTimer  = null;
    let scrollDebounceTimer  = null;
    let zoomIndicatorTimer   = null;
    let resizeTimer          = null;

    // ─── Anti klik kanan & shortcut ───────────────────────────
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && ['s','p','u'].includes(e.key)) e.preventDefault();
    });

    // ─── Dropdown ─────────────────────────────────────────────
    titleTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        titleDropdown.classList.toggle('show');
        const icon = titleTrigger.querySelector('.title-icon');
        icon.classList.replace(
            titleDropdown.classList.contains('show') ? 'fa-chevron-down' : 'fa-chevron-up',
            titleDropdown.classList.contains('show') ? 'fa-chevron-up'   : 'fa-chevron-down'
        );
    });
    document.addEventListener('click', (e) => {
        if (!titleTrigger.contains(e.target) && !titleDropdown.contains(e.target)) {
            titleDropdown.classList.remove('show');
            titleTrigger.querySelector('.title-icon').classList.replace('fa-chevron-up','fa-chevron-down');
        }
    });

    // ─── Zoom indicator ───────────────────────────────────────
    function showZoomIndicator(scale) {
        zoomIndicator.textContent = Math.round(scale * 100) + '%';
        zoomIndicator.classList.add('visible');
        clearTimeout(zoomIndicatorTimer);
        zoomIndicatorTimer = setTimeout(() => zoomIndicator.classList.remove('visible'), 1500);
    }

    // ─── Auto fit scale ───────────────────────────────────────
    const calculateAutoFitScale = async () => {
        if (!pdfDoc) return 1.0;
        const page = await pdfDoc.getPage(1);
        const vp   = page.getViewport({ scale: 1.0 });
        return (viewerEl.clientWidth - 32) / vp.width;
    };

    // ─────────────────────────────────────────────────────────
    //  buildLayout
    //  Hitung ukuran setiap halaman pada scale saat ini,
    //  buat slot-slot div dengan posisi absolute,
    //  set total tinggi container.
    //  Canvas belum dirender di sini.
    // ─────────────────────────────────────────────────────────
    const buildLayout = async () => {
        if (!pdfDoc) return;

        pageHeights = [];
        pageOffsets = [];
        totalHeight = 0;

        // Dapatkan ukuran semua halaman
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const vp   = page.getViewport({ scale: currentScale });
            pageHeights.push(vp.height);
            pageOffsets.push(totalHeight);
            totalHeight += vp.height + PAGE_GAP;
            pageWidth = Math.max(pageWidth, vp.width);
        }

        // Lebar container mengikuti lebar halaman terlebar
        // atau lebar viewer (mana yang lebih besar)
        const containerW = Math.max(pageWidth, viewerEl.clientWidth - 32);

        pagesContainer.style.width  = containerW + 'px';
        pagesContainer.style.height = totalHeight + 'px';

        // Hapus slot lama
        pagesContainer.innerHTML = '';

        // Buat slot untuk setiap halaman
        for (let i = 0; i < pdfDoc.numPages; i++) {
            const slot = document.createElement('div');
            slot.className   = 'page-slot';
            slot.id          = `page-slot-${i + 1}`;
            slot.dataset.page = i + 1;
            slot.dataset.rendered = 'false';

            // Posisi dan ukuran slot
            slot.style.top    = pageOffsets[i] + 'px';
            slot.style.height = pageHeights[i] + 'px';

            // Placeholder teks
            const ph = document.createElement('span');
            ph.className   = 'page-placeholder';
            ph.textContent = `Halaman ${i + 1}`;
            slot.appendChild(ph);

            pagesContainer.appendChild(slot);
        }
    };

    // ─────────────────────────────────────────────────────────
    //  renderPage
    //  Render satu halaman ke canvas di dalam slotnya.
    //  Dipanggil oleh intersection observer.
    // ─────────────────────────────────────────────────────────
    const renderPage = async (pageNum) => {
        if (renderingPages.has(pageNum)) return;
        const slot = document.getElementById(`page-slot-${pageNum}`);
        if (!slot || slot.dataset.rendered === 'true') return;

        renderingPages.add(pageNum);

        try {
            const page        = await pdfDoc.getPage(pageNum);
            const renderVp    = page.getViewport({ scale: currentScale * dpr });

            const canvas  = document.createElement('canvas');
            const ctx     = canvas.getContext('2d');

            canvas.width  = renderVp.width;
            canvas.height = renderVp.height;

            // CSS size = ukuran yang terlihat user
            canvas.style.width  = `${renderVp.width  / dpr}px`;
            canvas.style.height = `${renderVp.height / dpr}px`;

            await page.render({ canvasContext: ctx, viewport: renderVp }).promise;

            // Hapus placeholder, pasang canvas
            slot.innerHTML = '';
            slot.appendChild(canvas);
            slot.dataset.rendered = 'true';
        } catch (err) {
            console.error(`Gagal render halaman ${pageNum}:`, err);
        } finally {
            renderingPages.delete(pageNum);
        }
    };

    // ─────────────────────────────────────────────────────────
    //  unrenderPage
    //  Hapus canvas dari slot untuk bebaskan memori.
    //  Slot tetap ada dengan ukuran yang benar agar scroll tidak lompat.
    // ─────────────────────────────────────────────────────────
    const unrenderPage = (pageNum) => {
        const slot = document.getElementById(`page-slot-${pageNum}`);
        if (!slot || slot.dataset.rendered !== 'true') return;

        slot.innerHTML = '';
        const ph = document.createElement('span');
        ph.className   = 'page-placeholder';
        ph.textContent = `Halaman ${pageNum}`;
        slot.appendChild(ph);
        slot.dataset.rendered = 'false';
    };

    // ─────────────────────────────────────────────────────────
    //  Intersection Observer
    //  Memantau halaman mana yang masuk/keluar viewport.
    //  Buffer = 1.5x tinggi layar agar halaman di sekitar
    //  viewport juga dirender (mengurangi blank saat scroll)
    // ─────────────────────────────────────────────────────────
    let observer = null;

    const setupObserver = () => {
        if (observer) observer.disconnect();

        const bufferPx = viewerEl.clientHeight * 1.5;

        observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const pageNum = parseInt(entry.target.dataset.page);
                if (entry.isIntersecting) {
                    renderPage(pageNum);
                    // Render halaman tetangga juga (prefetch)
                    if (pageNum > 1)                  renderPage(pageNum - 1);
                    if (pageNum < pdfDoc.numPages)    renderPage(pageNum + 1);
                } else {
                    // Bebaskan memori untuk halaman jauh dari viewport
                    // Hanya unrender kalau sudah jauh (lebih dari 3 halaman)
                    const slots = pagesContainer.querySelectorAll('.page-slot');
                    let visiblePages = [];
                    slots.forEach(s => {
                        const rect = s.getBoundingClientRect();
                        const vRect = viewerEl.getBoundingClientRect();
                        if (rect.bottom > vRect.top - bufferPx && rect.top < vRect.bottom + bufferPx) {
                            visiblePages.push(parseInt(s.dataset.page));
                        }
                    });
                    const minVisible = Math.min(...visiblePages);
                    const maxVisible = Math.max(...visiblePages);
                    if (pageNum < minVisible - 3 || pageNum > maxVisible + 3) {
                        unrenderPage(pageNum);
                    }
                }
            });
        }, {
            root: viewerEl,
            rootMargin: `${bufferPx}px 0px ${bufferPx}px 0px`,
            threshold: 0
        });

        // Observe semua slot
        pagesContainer.querySelectorAll('.page-slot').forEach(slot => {
            observer.observe(slot);
        });
    };

    // ─────────────────────────────────────────────────────────
    //  initViewer
    //  Build layout + setup observer.
    //  Dipanggil saat pertama load dan saat scale berubah.
    // ─────────────────────────────────────────────────────────
    const initViewer = async () => {
        statusMessageEl.style.display = 'block';
        statusMessageEl.textContent   = 'Memuat...';

        // Reset semua rendered state
        renderingPages.clear();
        pageWidth = 0;

        await buildLayout();
        setupObserver();

        statusMessageEl.style.display = 'none';
        showZoomIndicator(currentScale);
    };

    // ─────────────────────────────────────────────────────────
    //  onZoom — tombol +/-
    // ─────────────────────────────────────────────────────────
    const onZoom = async (newScale) => {
        if (!pdfDoc) return;
        newScale = Math.max(autoFitScale * 0.5, Math.min(3.0, newScale));

        // Simpan posisi scroll relatif
        const ratioX = viewerEl.scrollLeft / Math.max(viewerEl.scrollWidth,  1);
        const ratioY = viewerEl.scrollTop  / Math.max(viewerEl.scrollHeight, 1);

        currentScale = newScale;
        await initViewer();

        // Kembalikan posisi scroll
        viewerEl.scrollLeft = ratioX * viewerEl.scrollWidth;
        viewerEl.scrollTop  = ratioY * viewerEl.scrollHeight;
    };

    // ─────────────────────────────────────────────────────────
    //  PINCH ZOOM — smooth preview via CSS transform
    //  Render ulang setelah jari diangkat (debounce)
    // ─────────────────────────────────────────────────────────
    viewerEl.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            isPinching = true;
            initialPinchDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            initialScale = currentScale;
            pagesContainer.style.transition = 'none';

            // Matikan scroll saat pinch
            viewerEl.style.overflow    = 'hidden';
            viewerEl.style.touchAction = 'none';
        }
    }, { passive: true });

    viewerEl.addEventListener('touchmove', (e) => {
        if (!isPinching || e.touches.length < 2) return;
        e.preventDefault();

        const dist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );

        const rawRatio = dist / initialPinchDistance;
        const minRatio = (autoFitScale * 0.5) / initialScale;
        const maxRatio = 3.0 / initialScale;
        const clamped  = Math.max(minRatio, Math.min(maxRatio, rawRatio));

        // Preview via CSS transform — ringan, GPU
        pagesContainer.style.transformOrigin = 'top center';
        pagesContainer.style.transform       = `scale(${clamped})`;
        showZoomIndicator(initialScale * clamped);

    }, { passive: false });

    viewerEl.addEventListener('touchend', (e) => {
        if (!isPinching) return;
        if (e.touches.length >= 2) return;

        isPinching = false;

        const matrix   = new DOMMatrix(window.getComputedStyle(pagesContainer).transform);
        const cssScale = matrix.a;

        let newScale = Math.max(autoFitScale * 0.5, Math.min(3.0, initialScale * cssScale));
        currentScale = newScale;

        // Reset transform preview
        pagesContainer.style.transition = 'transform 0.15s ease-out';
        pagesContainer.style.transform  = 'scale(1)';

        // Simpan posisi scroll
        const ratioX = viewerEl.scrollLeft / Math.max(viewerEl.scrollWidth,  1);
        const ratioY = viewerEl.scrollTop  / Math.max(viewerEl.scrollHeight, 1);

        // Debounce render ulang
        clearTimeout(renderDebounceTimer);
        renderDebounceTimer = setTimeout(async () => {
            await initViewer();

            viewerEl.style.overflow    = 'auto';
            viewerEl.style.touchAction = 'pan-x pan-y';

            viewerEl.scrollLeft = ratioX * viewerEl.scrollWidth;
            viewerEl.scrollTop  = ratioY * viewerEl.scrollHeight;
        }, 250);

    }, { passive: true });

    viewerEl.addEventListener('touchcancel', () => {
        if (isPinching) {
            isPinching = false;
            pagesContainer.style.transform = 'scale(1)';
            viewerEl.style.overflow    = 'auto';
            viewerEl.style.touchAction = 'pan-x pan-y';
            clearTimeout(renderDebounceTimer);
            renderDebounceTimer = setTimeout(() => initViewer(), 250);
        }
    }, { passive: true });

    // ─── Resize ───────────────────────────────────────────────
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(async () => {
            if (!pdfDoc) return;
            const oldFit = autoFitScale;
            autoFitScale = await calculateAutoFitScale();
            if (Math.abs(currentScale - oldFit) < 0.1) {
                currentScale = autoFitScale;
            }
            await initViewer();
        }, 300);
    });

    // ─── Find content ─────────────────────────────────────────
    function findContentDetails(contentId) {
        for (const key in allContentData) {
            const categoryData = allContentData[key];
            const flatList = Array.isArray(categoryData)
                ? categoryData
                : Object.values(categoryData).flat();
            const idx = flatList.findIndex(item => item.id === contentId);
            if (idx !== -1) {
                return {
                    contentItem: flatList[idx],
                    prevItem: idx > 0 ? flatList[idx - 1] : null,
                    nextItem: idx < flatList.length - 1 ? flatList[idx + 1] : null,
                    type: key
                };
            }
        }
        return null;
    }

    // ─── INIT ─────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const contentId = urlParams.get('id');
        if (!contentId) return;

        const result = findContentDetails(contentId);
        if (!result || !result.contentItem) {
            titleShortEl.textContent = 'Error';
            titleFullEl.textContent  = 'Tidak ditemukan.';
            statusMessageEl.style.display = 'none';
            return;
        }

        const { contentItem, prevItem, nextItem, type } = result;
        markAsCompleted(contentItem.id);
        updateLastActivity(type, contentItem);

        titleShortEl.textContent = contentItem.title;
        titleFullEl.textContent  = contentItem.title;

        try {
            pdfDoc       = await pdfjsLib.getDocument(contentItem.filePath).promise;
            autoFitScale = await calculateAutoFitScale();
            currentScale = autoFitScale;
            await initViewer();
        } catch (err) {
            console.error('Error:', err);
            statusMessageEl.textContent = 'Gagal memuat PDF.';
        }

        const prevBtn = document.getElementById('prev-materi');
        const nextBtn = document.getElementById('next-materi');

        if (prevItem) {
            prevBtn.disabled = false;
            prevBtn.addEventListener('click', () => { window.location.href = `viewer.html?id=${prevItem.id}`; });
        } else {
            prevBtn.disabled = true;
        }

        if (nextItem) {
            nextBtn.disabled = false;
            nextBtn.addEventListener('click', () => { window.location.href = `viewer.html?id=${nextItem.id}`; });
        } else {
            nextBtn.disabled = true;
        }

        document.getElementById('zoom-in').addEventListener('click',  () => onZoom(currentScale + 0.25));
        document.getElementById('zoom-out').addEventListener('click', () => onZoom(currentScale - 0.25));
    });
</script>
</body>
</html>
